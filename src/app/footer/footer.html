<div class="page-container">
  <div class="left-hero-section"></div>


  <div class="right-card-section">
    <div class="card-content">

      <hr class="top-divider" />

      <div class="header-group">
        <p class="sub-headline">
          YOU CAN LET GO OF THE STRESS,<br />
          THE HUSTLE, THE FRUSTRATIONS
        </p>

        <h1 class="main-headline">
          WE CAN TAKE IT<br />

      <div class="cta-container">
        <div class="engraved-frame">
          <a class="cta-link" (click)="openContact()">
            CONTACT US
          </a>
          
        </div>
      </div>

      <div class="footer-navigation">

            <img [src]="logo" alt="Avital logo" id="logoImg" (click)="gotoHome()">
          </div>

          <div class="legals">
            <a href="#privacy" class="legal-link">

            </a>
