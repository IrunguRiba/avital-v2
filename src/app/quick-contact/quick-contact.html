<div class="overlay">
  <div class="panel">
    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <span class="eyebrow">Get In Touch</span>
        <h2>Talk To Our Team</h2>
      </div>

      <button class="close" type="button" (click)="closePanel()">
        Close <span class="close-icon">&#10005;</span>
      </button>
    </div>

    <!-- SUB -->
    <p class="sub">Please fill in some quick details so we can reach you.</p>

    <form [formGroup]="form" (ngSubmit)="submitForm()">
      <!-- NAMES -->
      <div class="grid-2">
        <div class="field">
          <input type="text" formControlName="firstName" placeholder=" " />
          <label>First Name — Optional</label>
          <div class="line"></div>
        </div>

        <div class="field">
          <input type="text" formControlName="lastName" placeholder=" " />
          <label>Last Name — Optional</label>
          <div class="line"></div>
        </div>
      </div>

      <!-- CONTACT -->
      <div class="grid-2">
        <div class="field">
          <input type="email" formControlName="email" placeholder=" " />
          <label>Email Address — Required</label>
          <div class="line"></div>
        </div>

        <div class="field">
          <input type="tel" formControlName="phoneNumber" placeholder="+2547XXXXXXXX" />
          <label>Phone Number — Required</label>
          <div class="line"></div>
        </div>
      </div>

      <!-- INSTITUTION -->
      <div class="section">
        <h3>Select Institution Type</h3>

        <div class="radio-group">
          <label class="radio">
            <input type="radio" formControlName="institution" value="University" />
            <span></span>
            University
          </label>

          <label class="radio">
            <input type="radio" formControlName="institution" value="College" />
            <span></span>
            College
          </label>

          <label class="radio">
            <input type="radio" formControlName="institution" value="TTI" />
            <span></span>
            TTI
          </label>

          <label class="radio">
            <input type="radio" formControlName="institution" value="ANY OTHER" />
            <span></span>
            ANY OTHER
          </label>
        </div>
      </div>

      <!-- SERVICE -->
      <div class="section service-section">
        <h3>Service — Required</h3>

        <div class="radio-group">
          <label class="radio">
            <input type="radio" formControlName="service" value="Proposal / Brainstorming" />
            <span></span>
            Proposal / Brainstorming
          </label>

          <label class="radio">
            <input type="radio" formControlName="service" value="Project" />
            <span></span>
            Project
          </label>

          <label class="radio">
            <input type="radio" formControlName="service" value="Any Other" />
            <span></span>
            Any Other
          </label>
        </div>
      </div>

      <!-- SUBMIT -->
      <div class="actions">
        <button type="submit" [disabled]="form.invalid">
          <span>Submit</span>
        </button>
      </div>
    </form>
  </div>
</div>


<div
  class="notify"
  *ngIf="showNotification"
  [class.success]="notificationType === 'success'"
  [class.error]="notificationType === 'error'"
>
  <div class="notify-string"></div>
  
  <div class="notify-container">
    <div class="notify-header">
      <span class="notify-eyebrow">
        {{ notificationType === 'success' ? 'Status // Success' : 'Status // Alert' }}
      </span>
      <div class="notify-icon">
        <span *ngIf="notificationType === 'success'">✓</span>
        <span *ngIf="notificationType === 'error'">✕</span>
      </div>
    </div>

    <div class="notify-content">
      <h3>{{ notificationTitle }}</h3>
      <p>{{ notificationMessage }}</p>
    </div>

    <div class="notify-progress">
      <div class="notify-progress-bar"></div>
    </div>
  </div>
</div>
